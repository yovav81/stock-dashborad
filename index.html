<!--
  Dashboard page for viewing stock performance, news, and regulatory filings.
  This page expects a JSON file (dashboard-data.json) located in the same directory.
  It also reads a watchlist.json file to determine which tickers to include.

  To update data automatically, a separate Python script (collector.py) should run daily
  and output dashboard-data.json.  See collector.py for details.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #0a3d62;
      color: #fff;
      padding: 1rem;
      text-align: center;
    }
    main {
      padding: 1rem;
      max-width: 1200px;
      margin: auto;
    }
    h2 {
      margin-top: 2rem;
      border-bottom: 2px solid #0a3d62;
      padding-bottom: 0.5rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1rem;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 0.5rem;
      text-align: right;
    }
    th {
      background-color: #e8f6ff;
      text-align: center;
    }
    .positive {
      color: green;
    }
    .negative {
      color: red;
    }
    .news-item, .filing-item {
      border-bottom: 1px solid #eee;
      padding: 0.5rem 0;
    }
    .news-item a, .filing-item a {
      color: #0a3d62;
      text-decoration: none;
    }
    .news-item a:hover, .filing-item a:hover {
      text-decoration: underline;
    }
    #watchlist-form {
      margin-top: 1rem;
      display: flex;
      gap: 0.5rem;
    }
    #watchlist-form input[type="text"] {
      flex: 1;
      padding: 0.5rem;
    }
    #watchlist-list {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .watchlist-item {
      background-color: #e8f6ff;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .watchlist-item button {
      background: none;
      border: none;
      color: #a00;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <h1>Stock Performance Dashboard</h1>
  </header>
  <main>
    <section id="performance-section">
      <h2>Performance (1W / MTD / YTD)</h2>
      <table id="performance-table">
        <thead>
          <tr>
            <th>Ticker</th>
            <th>Week (%)</th>
            <th>MTD (%)</th>
            <th>YTD (%)</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="news-section">
      <h2>Latest News</h2>
      <div id="news-container"></div>
    </section>

    <section id="filings-section">
      <h2>Recent Filings &amp; Releases</h2>
      <div id="filings-container"></div>
    </section>

    <section id="watchlist-section">
      <h2>Watchlist</h2>
      <form id="watchlist-form" autocomplete="off">
        <input type="text" id="ticker-input" placeholder="Add ticker (e.g., UBER)" required />
        <button type="submit">Add</button>
      </form>
      <div id="watchlist-list"></div>
    </section>
  </main>

  <script>
    // State: list of tickers to track
    let watchlist = [];

    // Load watchlist from watchlist.json
    async function loadWatchlist() {
      try {
        const response = await fetch('watchlist.json');
        if (!response.ok) throw new Error('Failed to load watchlist');
        watchlist = await response.json();
        renderWatchlist();
      } catch (error) {
        console.error('Error loading watchlist:', error);
      }
    }

    // Save watchlist via POST request (to be implemented server side) or local fallback
    async function saveWatchlist() {
      try {
        // When hosted statically, saving must be handled by backend. Here we just log.
        console.log('Updated watchlist:', watchlist);
      } catch (error) {
        console.error('Error saving watchlist:', error);
      }
    }

    function renderWatchlist() {
      const listEl = document.getElementById('watchlist-list');
      listEl.innerHTML = '';
      watchlist.forEach(item => {
        const span = document.createElement('span');
        span.className = 'watchlist-item';
        span.textContent = item.ticker;
        const removeBtn = document.createElement('button');
        removeBtn.textContent = '×';
        removeBtn.title = 'Remove';
        removeBtn.addEventListener('click', () => {
          watchlist = watchlist.filter(w => w.ticker !== item.ticker);
          renderWatchlist();
          saveWatchlist();
          fetchData();
        });
        span.appendChild(removeBtn);
        listEl.appendChild(span);
      });
    }

    // Fetch dashboard data and populate tables
    async function fetchData() {
      try {
        const response = await fetch('dashboard-data.json');
        if (!response.ok) throw new Error('Failed to load data');
        const data = await response.json();
        populatePerformance(data.performance);
        populateNews(data.news);
        populateFilings(data.filings);
      } catch (error) {
        console.error('Error loading dashboard data:', error);
      }
    }

    function populatePerformance(performance) {
      const tbody = document.querySelector('#performance-table tbody');
      tbody.innerHTML = '';
      performance.forEach(item => {
        if (!watchlist.some(w => w.ticker === item.ticker)) return;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="text-align:left; font-weight:bold;">${item.ticker}</td>
          <td class="${item.week_change_pct >= 0 ? 'positive' : 'negative'}">${item.week_change_pct.toFixed(2)}%</td>
          <td class="${item.month_change_pct >= 0 ? 'positive' : 'negative'}">${item.month_change_pct.toFixed(2)}%</td>
          <td class="${item.ytd_change_pct >= 0 ? 'positive' : 'negative'}">${item.ytd_change_pct.toFixed(2)}%</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function populateNews(news) {
      const container = document.getElementById('news-container');
      container.innerHTML = '';
      Object.keys(news).forEach(ticker => {
        if (!watchlist.some(w => w.ticker === ticker)) return;
        const section = document.createElement('div');
        const heading = document.createElement('h3');
        heading.textContent = ticker;
        section.appendChild(heading);
        news[ticker].forEach(article => {
          const div = document.createElement('div');
          div.className = 'news-item';
          const a = document.createElement('a');
          a.href = article.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = article.title;
          div.appendChild(a);
          const meta = document.createElement('div');
          meta.style.fontSize = '0.8rem';
          meta.style.color = '#555';
          meta.textContent = `${article.source} • ${new Date(article.published_at).toLocaleString()}`;
          div.appendChild(meta);
          section.appendChild(div);
        });
        container.appendChild(section);
      });
    }

    function populateFilings(filings) {
      const container = document.getElementById('filings-container');
      container.innerHTML = '';
      Object.keys(filings).forEach(ticker => {
        if (!watchlist.some(w => w.ticker === ticker)) return;
        const section = document.createElement('div');
        const heading = document.createElement('h3');
        heading.textContent = ticker;
        section.appendChild(heading);
        filings[ticker].forEach(filing => {
          const div = document.createElement('div');
          div.className = 'filing-item';
          const a = document.createElement('a');
          a.href = filing.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = `${filing.type} – ${filing.title}`;
          div.appendChild(a);
          const meta = document.createElement('div');
          meta.style.fontSize = '0.8rem';
          meta.style.color = '#555';
          meta.textContent = `${new Date(filing.date).toLocaleDateString()}`;
          div.appendChild(meta);
          section.appendChild(div);
        });
        container.appendChild(section);
      });
    }

    document.getElementById('watchlist-form').addEventListener('submit', event => {
      event.preventDefault();
      const tickerInput = document.getElementById('ticker-input');
      const ticker = tickerInput.value.trim().toUpperCase();
      if (ticker && !watchlist.some(w => w.ticker === ticker)) {
        watchlist.push({ ticker });
        renderWatchlist();
        saveWatchlist();
        fetchData();
      }
      tickerInput.value = '';
    });

    // Initialize page
    window.addEventListener('DOMContentLoaded', () => {
      loadWatchlist().then(() => {
        fetchData();
      });
    });
  </script>
</body>
</html>
