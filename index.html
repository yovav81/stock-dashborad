<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
<meta charset="UTF-8">
<title>Stock Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
padding:0;
direction:rtl;
}

header{
background:#1b2a4e;
color:white;
padding:15px;
text-align:center;
}

main{
max-width:1200px;
margin:auto;
padding:20px;
}

h2{
border-bottom:2px solid #1b2a4e;
padding-bottom:5px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-bottom:20px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#eef3ff;
}

.positive{
color:green;
font-weight:bold;
}

.negative{
color:red;
font-weight:bold;
}

.news-item,.filing-item{
padding:8px;
border-bottom:1px solid #eee;
}

.news-item a,.filing-item a{
text-decoration:none;
color:#1b2a4e;
font-weight:bold;
}

.watchlist-bar{
margin-top:20px;
}

.watchlist-item{
display:inline-block;
background:#e8efff;
padding:5px 10px;
margin:3px;
border-radius:4px;
}

button{
padding:8px 15px;
border:none;
background:#1b2a4e;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{
opacity:0.9;
}

.loading{
color:#777;
font-style:italic;
}

</style>

</head>

<body>

<header>
<h1>Stock Dashboard</h1>
<div id="updated"></div>
</header>

<main>

<h2>ביצועי מניות</h2>

<table id="performance-table">
<thead>
<tr>
<th>מניה</th>
<th>שבוע</th>
<th>מתחילת חודש</th>
<th>מתחילת שנה</th>
</tr>
</thead>

<tbody></tbody>
</table>


<h2>חדשות</h2>
<div id="news"></div>


<h2>דוחות ודיווחים</h2>
<div id="filings"></div>


<div class="watchlist-bar">

<h2>רשימת מניות</h2>

<input id="ticker-input" placeholder="הכנס סימבול מניה">

<button onclick="addTicker()">הוסף</button>

<button onclick="refreshData()">רענן נתונים</button>

<div id="watchlist"></div>

</div>

</main>


<script>

let watchlist=[]
let dashboardData={}


function clearDashboard(){

document.querySelector("#performance-table tbody").innerHTML=
`<tr><td colspan="4" class="loading">Loading...</td></tr>`

document.getElementById("news").innerHTML=
`<div class="loading">Loading...</div>`

document.getElementById("filings").innerHTML=
`<div class="loading">Loading...</div>`

}


async function loadData(){

const res=await fetch("dashboard-data.json?"+Date.now())
dashboardData=await res.json()

document.getElementById("updated").innerText=
"עודכן: "+new Date(dashboardData.updated_at).toLocaleString()

renderDashboard()

}


function renderDashboard(){

renderPerformance()
renderNews()
renderFilings()

}


function renderPerformance(){

const tbody=document.querySelector("#performance-table tbody")
tbody.innerHTML=""

let filtered=dashboardData.performance.filter(p=>watchlist.includes(p.ticker))

filtered.forEach(p=>{

let row=document.createElement("tr")

row.innerHTML=`

<td>${p.ticker}</td>

<td class="${p.week_change_pct>=0?'positive':'negative'}">
${p.week_change_pct.toFixed(2)}%
</td>

<td class="${p.month_change_pct>=0?'positive':'negative'}">
${p.month_change_pct.toFixed(2)}%
</td>

<td class="${p.ytd_change_pct>=0?'positive':'negative'}">
${p.ytd_change_pct.toFixed(2)}%
</td>

`

tbody.appendChild(row)

})

if(filtered.length===0){

tbody.innerHTML=`<tr><td colspan="4">אין נתונים</td></tr>`

}

}


function renderNews(){

const box=document.getElementById("news")
box.innerHTML=""

watchlist.forEach(t=>{

let items=dashboardData.news[t]

if(!items)return

let title=document.createElement("h3")
title.innerText=t
box.appendChild(title)

items.forEach(n=>{

let div=document.createElement("div")
div.className="news-item"

div.innerHTML=

`<a href="${n.url}" target="_blank">${n.title}</a>
<br>
<small>${n.source||""}</small>`

box.appendChild(div)

})

})

}


function renderFilings(){

const box=document.getElementById("filings")
box.innerHTML=""

watchlist.forEach(t=>{

let items=dashboardData.filings[t]

if(!items)return

let title=document.createElement("h3")
title.innerText=t
box.appendChild(title)

items.forEach(f=>{

let div=document.createElement("div")
div.className="filing-item"

div.innerHTML=

`<a href="${f.url}" target="_blank">
${f.type} - ${f.title}
</a>
<br>
<small>${f.date}</small>`

box.appendChild(div)

})

})

}


function renderWatchlist(){

const box=document.getElementById("watchlist")
box.innerHTML=""

watchlist.forEach(t=>{

let span=document.createElement("span")
span.className="watchlist-item"

span.innerHTML=
`${t} <button onclick="removeTicker('${t}')">x</button>`

box.appendChild(span)

})

}


function addTicker(){

let t=document.getElementById("ticker-input").value.trim().toUpperCase()

if(!t)return

if(!watchlist.includes(t)){

watchlist.push(t)

}

renderWatchlist()

clearDashboard()

renderDashboard()

document.getElementById("ticker-input").value=""

}


function removeTicker(t){

watchlist=watchlist.filter(x=>x!==t)

renderWatchlist()

clearDashboard()

renderDashboard()

}


async function refreshData(){

clearDashboard()

await loadData()

}


window.onload=async()=>{

await loadData()

}


</script>


</body>
</html>
