<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      direction: rtl;
      background: #eef1f7;
      color: #111;
    }

    header {
      background: #1f3566;
      color: white;
      text-align: center;
      padding: 24px 16px;
    }

    header h1 {
      margin: 0 0 10px 0;
      font-size: 2.4rem;
    }

    #updated {
      font-size: 1rem;
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 24px 40px;
    }

    h2 {
      margin-top: 28px;
      margin-bottom: 14px;
      border-bottom: 2px solid #1f3566;
      padding-bottom: 8px;
      font-size: 1.2rem;
      text-align: right;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-bottom: 24px;
    }

    th, td {
      border: 1px solid #cfd6e4;
      padding: 12px 10px;
      text-align: center;
      vertical-align: middle;
    }

    th {
      background: #dde3ef;
      font-weight: bold;
    }

    .positive {
      color: #0a8a2a;
      font-weight: bold;
    }

    .negative {
      color: #c62828;
      font-weight: bold;
    }

    .section-box {
      background: transparent;
      min-height: 20px;
    }

    .news-group,
    .filings-group {
      margin-bottom: 18px;
      background: white;
      padding: 10px 12px;
      border: 1px solid #d5dbe8;
    }

    .news-group h3,
    .filings-group h3 {
      margin: 0 0 10px 0;
      color: #1f3566;
      text-align: right;
    }

    .news-item,
    .filing-item {
      padding: 8px 0;
      border-bottom: 1px solid #eceff5;
      text-align: right;
    }

    .news-item:last-child,
    .filing-item:last-child {
      border-bottom: none;
    }

    .news-item a,
    .filing-item a {
      color: #1f3566;
      text-decoration: none;
      font-weight: bold;
    }

    .news-item a:hover,
    .filing-item a:hover {
      text-decoration: underline;
    }

    .meta {
      color: #666;
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .watchlist-bar {
      margin-top: 26px;
    }

    .watchlist-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
      justify-content: flex-start;
    }

    .watchlist-controls input {
      min-width: 260px;
      padding: 10px 12px;
      border: 1px solid #c5cede;
      border-radius: 4px;
      background: white;
    }

    button {
      border: none;
      background: #1f3566;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.92;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #watchlist {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .watchlist-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #e5ebf7;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.95rem;
    }

    .watchlist-item button {
      background: transparent;
      color: #a32020;
      padding: 0;
      font-size: 1rem;
    }

    .loading,
    .empty-state {
      color: #666;
      font-style: italic;
      background: white;
      border: 1px solid #d5dbe8;
      padding: 12px;
    }

    .status-box {
      background: #fff7d6;
      border: 1px solid #ecd98a;
      color: #5e4a00;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 14px;
      display: none;
      text-align: right;
    }
  </style>
</head>

<body>
  <header>
    <h1>Stock Dashboard</h1>
    <div id="updated"></div>
  </header>

  <main>
    <div id="status-box" class="status-box"></div>

    <section>
      <h2>ביצועי מניות</h2>
      <table id="performance-table">
        <thead>
          <tr>
            <th>מניה</th>
            <th>שבוע</th>
            <th>מתחילת חודש</th>
            <th>מתחילת שנה</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div id="performance-empty" class="empty-state" style="display:none;">אין נתונים</div>
    </section>

    <section>
      <h2>חדשות</h2>
      <div id="news" class="section-box"></div>
    </section>

    <section>
      <h2>דוחות ודיווחים</h2>
      <div id="filings" class="section-box"></div>
    </section>

    <section class="watchlist-bar">
      <h2>רשימת מניות</h2>

      <div class="watchlist-controls">
        <input id="ticker-input" type="text" placeholder="הכנס סימבול מניה" />
        <button type="button" onclick="addTicker()">הוסף</button>
        <button id="refresh-btn" type="button" onclick="refreshData()">רענן נתונים</button>
      </div>

      <div id="watchlist"></div>
    </section>
  </main>

  <script>
    const WORKER_URL = "https://divine-dust-ef69.yovav81.workers.dev";

    let watchlist = [];
    let dashboardData = {
      performance: [],
      news: {},
      filings: {},
      updated_at: null
    };

    function showStatus(message, persistent = false) {
      const box = document.getElementById("status-box");
      box.textContent = message;
      box.style.display = "block";

      if (!persistent) {
        setTimeout(() => {
          box.style.display = "none";
        }, 4500);
      }
    }

    function setRefreshDisabled(disabled) {
      const btn = document.getElementById("refresh-btn");
      btn.disabled = disabled;
    }

    function clearDashboard(showLoading = true) {
      const tbody = document.querySelector("#performance-table tbody");
      const newsBox = document.getElementById("news");
      const filingsBox = document.getElementById("filings");
      const perfEmpty = document.getElementById("performance-empty");

      perfEmpty.style.display = "none";

      if (showLoading) {
        tbody.innerHTML = `<tr><td colspan="4" class="loading">Loading...</td></tr>`;
        newsBox.innerHTML = `<div class="loading">Loading...</div>`;
        filingsBox.innerHTML = `<div class="loading">Loading...</div>`;
      } else {
        tbody.innerHTML = "";
        newsBox.innerHTML = "";
        filingsBox.innerHTML = "";
      }
    }

    async function fetchWatchlistJson() {
      const res = await fetch("watchlist.json?t=" + Date.now(), { cache: "no-store" });
      if (!res.ok) {
        throw new Error("Failed to load watchlist.json");
      }
      return await res.json();
    }

    async function fetchDashboardJson() {
      const res = await fetch("dashboard-data.json?t=" + Date.now(), { cache: "no-store" });
      if (!res.ok) {
        throw new Error("Failed to load dashboard-data.json");
      }
      return await res.json();
    }

    async function loadWatchlist() {
      try {
        const data = await fetchWatchlistJson();
        watchlist = data.map(item => item.ticker);
        renderWatchlist();
      } catch (err) {
        console.error("watchlist load error:", err);
        watchlist = [];
        renderWatchlist();
        showStatus("שגיאה בטעינת רשימת המניות", true);
      }
    }

    async function loadData() {
      try {
        dashboardData = await fetchDashboardJson();

        const updatedEl = document.getElementById("updated");
        if (dashboardData.updated_at) {
          updatedEl.innerText =
            "עודכן: " + new Date(dashboardData.updated_at).toLocaleString("he-IL");
        } else {
          updatedEl.innerText = "";
        }

        renderDashboard();
      } catch (err) {
        console.error("dashboard load error:", err);
        clearDashboard(false);
        showStatus("שגיאה בטעינת נתוני הדאשבורד", true);
      }
    }

    function renderWatchlist() {
      const box = document.getElementById("watchlist");
      box.innerHTML = "";

      if (!watchlist.length) {
        box.innerHTML = `<div class="empty-state">אין מניות ברשימה</div>`;
        return;
      }

      watchlist.forEach(ticker => {
        const item = document.createElement("span");
        item.className = "watchlist-item";

        const text = document.createElement("span");
        text.textContent = ticker;

        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.textContent = "×";
        removeBtn.title = "הסר מניה";
        removeBtn.onclick = () => removeTicker(ticker);

        item.appendChild(text);
        item.appendChild(removeBtn);
        box.appendChild(item);
      });
    }

    function renderPerformance() {
      const tbody = document.querySelector("#performance-table tbody");
      const perfEmpty = document.getElementById("performance-empty");
      tbody.innerHTML = "";

      const filtered = (dashboardData.performance || []).filter(item =>
        watchlist.includes(item.ticker)
      );

      if (!filtered.length) {
        perfEmpty.style.display = "block";
        return;
      }

      perfEmpty.style.display = "none";

      filtered.forEach(item => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td><strong>${item.ticker}</strong></td>
          <td class="${item.week_change_pct >= 0 ? "positive" : "negative"}">${Number(item.week_change_pct).toFixed(2)}%</td>
          <td class="${item.month_change_pct >= 0 ? "positive" : "negative"}">${Number(item.month_change_pct).toFixed(2)}%</td>
          <td class="${item.ytd_change_pct >= 0 ? "positive" : "negative"}">${Number(item.ytd_change_pct).toFixed(2)}%</td>
        `;
        tbody.appendChild(row);
      });
    }

    function renderNews() {
      const box = document.getElementById("news");
      box.innerHTML = "";

      let found = false;

      watchlist.forEach(ticker => {
        const items = (dashboardData.news && dashboardData.news[ticker]) || [];
        if (!items.length) return;

        found = true;

        const group = document.createElement("div");
        group.className = "news-group";

        const title = document.createElement("h3");
        title.textContent = ticker;
        group.appendChild(title);

        items.forEach(article => {
          const div = document.createElement("div");
          div.className = "news-item";

          div.innerHTML = `
            <a href="${article.url || "#"}" target="_blank" rel="noopener noreferrer">${article.title || "כתבה"}</a>
            <div class="meta">${article.source || ""}${article.published_at ? " • " + new Date(article.published_at).toLocaleString("he-IL") : ""}</div>
          `;

          group.appendChild(div);
        });

        box.appendChild(group);
      });

      if (!found) {
        box.innerHTML = `<div class="empty-state">אין כתבות להצגה</div>`;
      }
    }

    function renderFilings() {
      const box = document.getElementById("filings");
      box.innerHTML = "";

      let found = false;

      watchlist.forEach(ticker => {
        const items = (dashboardData.filings && dashboardData.filings[ticker]) || [];
        if (!items.length) return;

        found = true;

        const group = document.createElement("div");
        group.className = "filings-group";

        const title = document.createElement("h3");
        title.textContent = ticker;
        group.appendChild(title);

        items.forEach(filing => {
          const div = document.createElement("div");
          div.className = "filing-item";

          div.innerHTML = `
            <a href="${filing.url || "#"}" target="_blank" rel="noopener noreferrer">${filing.type || "דיווח"} - ${filing.title || ""}</a>
            <div class="meta">${filing.date || ""}</div>
          `;

          group.appendChild(div);
        });

        box.appendChild(group);
      });

      if (!found) {
        box.innerHTML = `<div class="empty-state">אין דיווחים להצגה</div>`;
      }
    }

    function renderDashboard() {
      clearDashboard(false);
      renderPerformance();
      renderNews();
      renderFilings();
    }

    function addTicker() {
      const input = document.getElementById("ticker-input");
      const ticker = input.value.trim().toUpperCase();

      if (!ticker) return;

      if (!watchlist.includes(ticker)) {
        watchlist.push(ticker);
        renderWatchlist();
        clearDashboard(true);
        renderDashboard();
        showStatus(`המניה ${ticker} נוספה. עכשיו לחץ "רענן נתונים".`);
      }

      input.value = "";
    }

    function removeTicker(ticker) {
      watchlist = watchlist.filter(t => t !== ticker);
      renderWatchlist();
      clearDashboard(true);
      renderDashboard();
      showStatus(`המניה ${ticker} הוסרה. עכשיו לחץ "רענן נתונים" כדי לשמור את השינוי.`);
    }

    async function waitForUpdatedData(oldUpdatedAt, maxAttempts = 24, delayMs = 5000) {
      for (let attempt = 1; attempt <= maxAttempts; attempt++) {
        try {
          const newWatchlistData = await fetchWatchlistJson();
          const newTickers = newWatchlistData.map(item => item.ticker);

          const newDashboard = await fetchDashboardJson();
          const newUpdatedAt = newDashboard.updated_at || null;

          const allTickersPresent = watchlist.every(t => newTickers.includes(t));
          const performanceTickers = (newDashboard.performance || []).map(x => x.ticker);
          const relevantTickersPresent = watchlist.every(t => performanceTickers.includes(t));

          if (allTickersPresent && newUpdatedAt && newUpdatedAt !== oldUpdatedAt && relevantTickersPresent) {
            dashboardData = newDashboard;
            watchlist = newTickers;
            renderWatchlist();

            const updatedEl = document.getElementById("updated");
            updatedEl.innerText = "עודכן: " + new Date(dashboardData.updated_at).toLocaleString("he-IL");

            renderDashboard();
            return true;
          }
        } catch (err) {
          console.error("polling error:", err);
        }

        showStatus(`מעדכן נתונים... ניסיון ${attempt} מתוך ${maxAttempts}`, true);
        await new Promise(resolve => setTimeout(resolve, delayMs));
      }

      return false;
    }

    async function refreshData() {
      try {
        setRefreshDisabled(true);
        clearDashboard(true);

        const oldUpdatedAt = dashboardData.updated_at || null;

        showStatus("שומר את רשימת המניות ומפעיל עדכון נתונים. זה עשוי לקחת עד 1–2 דקות.", true);

        const resp = await fetch(WORKER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            tickers: watchlist
          })
        });

        const result = await resp.json();

        if (!resp.ok || !result.ok) {
          throw new Error(result.error || result.details || "Worker failed");
        }

        showStatus("העדכון הופעל בהצלחה. ממתין לנתונים החדשים...", true);

        const success = await waitForUpdatedData(oldUpdatedAt, 24, 5000);

        if (success) {
          showStatus("הנתונים עודכנו בהצלחה");
        } else {
          await loadWatchlist();
          await loadData();
          showStatus("ה־workflow הופעל, אבל הנתונים עוד לא הושלמו. נסה שוב בעוד חצי דקה.", true);
        }

      } catch (err) {
        console.error(err);
        showStatus("שגיאה בהפעלת עדכון הנתונים: " + err.message, true);
      } finally {
        setRefreshDisabled(false);
      }
    }

    window.onload = async () => {
      clearDashboard(true);
      await loadWatchlist();
      await loadData();
    };
  </script>
</body>
</html>
